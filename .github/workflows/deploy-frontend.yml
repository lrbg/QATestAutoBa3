name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ''
          NEXT_PUBLIC_USE_MOCK: 'true'
          NEXT_PUBLIC_APP_NAME: 'QA Platform'
          GITHUB_PAGES: 'true'
          NODE_ENV: production
        run: |
          npm run build
          echo "Build completed"
          ls -la out/

      - name: Add .nojekyll file
        run: touch frontend/out/.nojekyll

      - name: Add 404.html for SPA routing
        run: cp frontend/out/index.html frontend/out/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy frontend to GitHub Pages - ${{ github.sha }}'

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://lrbg.github.io/QATestAutoBa3" >> $GITHUB_STEP_SUMMARY
          echo "- **Mock Mode:** true (no backend required)" >> $GITHUB_STEP_SUMMARY
